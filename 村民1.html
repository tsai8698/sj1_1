<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水井時空冒險 - 第一關</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --gold: #f1c40f; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 90%; max-width: 500px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: var(--primary); font-size: 1.5rem; }
        .story-text { color: #555; line-height: 1.6; margin-bottom: 20px; text-align: left; background: #fff9e6; padding: 15px; border-left: 5px solid var(--gold); border-radius: 5px; }
        
        /* 拼圖區塊樣式 */
        #puzzle-container { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; 
            width: 300px; height: 300px; margin: 20px auto; border: 3px solid var(--primary); 
            background: #eee; position: relative;
        }
        .tile { 
            width: 100px; height: 100px; background-image: url('S__14860295_0.jpg'); 
            background-size: 300px 300px; cursor: pointer; border-radius: 2px;
        }

        /* 成功彈窗 */
        #success-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white; justify-content: center; align-items: center; flex-direction: column; z-index: 100; text-align: center;
        }
        
        .address-box {
            background: white; color: var(--primary); 
            padding: 15px; border-radius: 15px; margin-top: 15px;
            border: 2px solid var(--gold);
            width: 80%;
        }

        /* 通關憑證樣式 */
        .pass-certificate {
            margin-top: 20px;
            padding: 10px 25px;
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: #fff;
            font-weight: bold;
            font-size: 1.4rem;
            border-radius: 50px;
            border: 2px solid #fff;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🌀 第一章：風雲客棧的異變</h1>
    <div class="story-text">
        小帥在風雲客棧散步時，突然天色昏暗，一道裂縫將他吸入！系統提示：<b>「修復眼前的龍形碎片，才能解開前往下一處的導航。」</b>
    </div>
    
    <p>💡 點擊兩個方塊可交換位置，拼出完整的龍形地標！</p>
    
    <div id="puzzle-container"></div>

    <div style="margin-top:20px; font-size: 0.9rem; color: #888;">
        📍 當前位置：風雲客棧
    </div>
</div>

<div id="success-overlay">
    <div style="font-size: 4rem; margin-bottom: 5px;">✨</div>
    <h2 style="font-size: 1.8rem; color: var(--gold); margin: 0;">碎片修復完成！</h2>
    
    <div class="pass-certificate">
        第一關：通關憑證
    </div>

     <p style="font-size: 1.1rem; margin-top: 20px;">請向關主出示憑證後<br>前往下一關地點：</p>
    
    <div class="address-box">
        <p style="margin: 0; font-weight: bold; color: var(--accent);">📍 下一站：奉天宮木棧道涼亭</p>
        <p style="margin: 8px 0 0 0; font-size: 1rem; line-height: 1.3;">653雲林縣口湖鄉<br>水井路21之2號</p>
    </div>
    
    <p style="margin-top: 25px; color: #bdc3c7; font-size: 0.85rem;">抵達目的地後，請掃描現場 QR Code 進入第二關</p>
</div>

<script>
    const container = document.getElementById('puzzle-container');
    let tiles = [0, 1, 2, 3, 4, 5, 6, 7, 8];
    
    // 打亂拼圖
    tiles.sort(() => Math.random() - 0.5);

    function render() {
        container.innerHTML = '';
        tiles.forEach((tileIndex, i) => {
            const tile = document.createElement('div');
            tile.className = 'tile';
            const row = Math.floor(tileIndex / 3);
            const col = tileIndex % 3;
            tile.style.backgroundPosition = `-${col * 100}px -${row * 100}px`;
            tile.onclick = () => swap(i);
            container.appendChild(tile);
        });
    }

    let selected = null;
    function swap(index) {
        if (selected === null) {
            selected = index;
            container.children[index].style.outline = "4px solid red";
        } else {
            [tiles[selected], tiles[index]] = [tiles[index], tiles[selected]];
            selected = null;
            render();
            checkWin();
        }
    }

    function checkWin() {
        if (tiles.every((val, i) => val === i)) {
            setTimeout(() => {
                document.getElementById('success-overlay').style.display = 'flex';
            }, 500);
        }
    }

    render();
</script>
</body>
</html>
